---
name: Test Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, ready_for_review, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: 'bash -Eeuo pipefail {0}'

jobs:
  prepare:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    name: Prepare
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}

      - name: Filter changed files
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - .github/actions/setup-pnpm/**
              - .github/workflows/test-coverage.yaml
              - playwright.config.ts
              - vite.config.ts
              - index.html
              - 'public/**'
              - package.json
              - pnpm-lock.yaml
              - scripts/report-test-results.ts
              - 'scripts/lib/**'

  e2e-coverage:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && needs.prepare.outputs.e2e == 'true')
    name: E2E Test Coverage
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          install-playwright: true

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-coverage
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  report:
    name: E2E Test Report
    needs: [e2e-coverage]
    runs-on: ubuntu-latest
    if: always() && needs.e2e-coverage.result != 'skipped'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download E2E results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-coverage
          path: .

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Generate and post report
        if: always()
        run: |
          node scripts/report-test-results.ts \
            --type e2e \
            --results-dir test-results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
